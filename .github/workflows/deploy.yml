# MVP: GitHub Environments (staging | production) · env-scoped secrets only · S3 backend (no DynamoDB).

name: Deploy

on:
  push:
    branches: [main, production]

permissions:
  contents: read

jobs:
  deploy:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/production' && 'production' || 'staging' }}
    env:
      TF_IN_AUTOMATION: "true"
      IMAGE_TAG: ${{ github.sha }}
      TF_VAR_project: cv-bot
      TF_STATE_KEY: ${{ github.ref == 'refs/heads/production' && 'cv-bot/production.tfstate' || 'cv-bot/staging.tfstate' }}
      TF_VAR_deployment_env: ${{ github.ref == 'refs/heads/production' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Guard (required environment secrets)
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -e
          missing=""
          [ -z "${TF_STATE_BUCKET:-}" ] && missing="${missing} TF_STATE_BUCKET"
          [ -z "${AWS_REGION:-}" ] && missing="${missing} AWS_REGION"
          [ -z "${AWS_ACCESS_KEY_ID:-}" ] && missing="${missing} AWS_ACCESS_KEY_ID"
          [ -z "${AWS_SECRET_ACCESS_KEY:-}" ] && missing="${missing} AWS_SECRET_ACCESS_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing environment secrets (configure staging + production):${missing}"
            exit 1
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform apply (full stack; placeholder image until ECR push)
        working-directory: infra/terraform
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
          TF_VAR_openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          TF_VAR_qdrant_url: ${{ secrets.QDRANT_URL }}
          TF_VAR_qdrant_api_key: ${{ secrets.QDRANT_API_KEY }}
        run: terraform apply -auto-approve

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve ECR push URL
        id: ecr
        run: |
          set -e
          URI=$(aws ecr describe-repositories \
            --repository-names "${TF_VAR_project}-${TF_VAR_deployment_env}-api" \
            --query 'repositories[0].repositoryUri' --output text)
          echo "repository_url=${URI}" >> "$GITHUB_OUTPUT"

      - name: Build and push container image
        env:
          ECR_URI: ${{ steps.ecr.outputs.repository_url }}
        run: |
          set -e
          docker build -f apps/backend/Dockerfile -t "cv-bot:${IMAGE_TAG}" .
          docker tag "cv-bot:${IMAGE_TAG}" "${ECR_URI}:${IMAGE_TAG}"
          docker push "${ECR_URI}:${IMAGE_TAG}"
          echo "LAMBDA_IMAGE_URI=${ECR_URI}:${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Terraform apply (Lambda image)
        working-directory: infra/terraform
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
          TF_VAR_openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          TF_VAR_qdrant_url: ${{ secrets.QDRANT_URL }}
          TF_VAR_qdrant_api_key: ${{ secrets.QDRANT_API_KEY }}
        run: terraform apply -auto-approve -var="lambda_image_uri=${LAMBDA_IMAGE_URI}"

      - name: Export Terraform outputs (single JSON)
        working-directory: infra/terraform
        run: terraform output -json > "${GITHUB_WORKSPACE}/outputs.json"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Build static frontend
        working-directory: apps/frontend
        run: |
          set -e
          export NEXT_PUBLIC_API_URL="$(jq -r '.http_api_endpoint.value // empty' "${GITHUB_WORKSPACE}/outputs.json")"
          npm ci && npm run build && npm run export

      - name: Deploy to S3 and invalidate CloudFront
        run: |
          set -e
          BUCKET="$(jq -r '.frontend_bucket.value' "${GITHUB_WORKSPACE}/outputs.json")"
          DIST="$(jq -r '.cloudfront_distribution_id.value' "${GITHUB_WORKSPACE}/outputs.json")"
          aws s3 sync apps/frontend/out "s3://${BUCKET}/" --delete \
            --exclude "*.html" \
            --exclude "**/*.html" \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 sync apps/frontend/out "s3://${BUCKET}/" \
            --exclude "*" \
            --include "*.html" \
            --include "**/*.html" \
            --cache-control "public,max-age=0,must-revalidate"
          aws cloudfront create-invalidation --distribution-id "$DIST" --paths "/*"

      - name: Job summary
        run: |
          echo "### Deployed API" >> "$GITHUB_STEP_SUMMARY"
          echo "\`$(jq -r '.http_api_endpoint.value' "${GITHUB_WORKSPACE}/outputs.json")\`" >> "$GITHUB_STEP_SUMMARY"
