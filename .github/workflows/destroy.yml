# Manual teardown of the whole Terraform stack (same remote state as deploy).

name: Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY to confirm"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_VAR_project: cv-bot
  TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
  TF_VAR_openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
  TF_VAR_qdrant_url: ${{ secrets.QDRANT_URL }}
  TF_VAR_qdrant_api_key: ${{ secrets.QDRANT_API_KEY }}

jobs:
  refuse:
    if: github.event.inputs.confirm != 'DESTROY'
    runs-on: ubuntu-latest
    steps:
      - run: echo "::error::Type DESTROY exactly to confirm." && exit 1

  destroy:
    if: github.event.inputs.confirm == 'DESTROY'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate AWS secrets (fail fast)
        id: aws_auth
        shell: bash
        run: |
          set -euo pipefail
          err() { echo "::error::$1"; exit 1; }
          region="${{ secrets.AWS_REGION }}"
          if [ -z "${region// }" ]; then
            err "GitHub Actions secret AWS_REGION is missing or empty. Add repository secret AWS_REGION (e.g. us-east-1)."
          fi
          role="${{ secrets.AWS_ROLE_ARN }}"
          ak="${{ secrets.AWS_ACCESS_KEY_ID }}"
          sk="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          if [ -n "${role// }" ]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
            echo "AWS auth: OIDC (AWS_ROLE_ARN)."
          elif [ -n "${ak// }" ] && [ -n "${sk// }" ]; then
            echo "mode=keys" >> "$GITHUB_OUTPUT"
            echo "AWS auth: static credentials (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY)."
          else
            err "Set either AWS_ROLE_ARN (OIDC) or both AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY."
          fi

      - name: Configure AWS credentials (OIDC)
        if: steps.aws_auth.outputs.mode == 'oidc'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configure AWS credentials (access keys)
        if: steps.aws_auth.outputs.mode == 'keys'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Require remote state configuration
        run: test -n "${{ secrets.TF_STATE_BUCKET }}" && test -n "${{ secrets.TF_LOCK_TABLE }}"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/terraform
        run: >
          terraform init -input=false
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          -backend-config="key=cv-bot/terraform.tfstate"
          -backend-config="region=${{ secrets.AWS_REGION }}"
          -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"
          -backend-config="encrypt=true"

      - name: Terraform destroy
        working-directory: infra/terraform
        run: terraform destroy -auto-approve
