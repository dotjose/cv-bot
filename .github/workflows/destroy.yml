# Manual teardown using GitHub Environment **staging** secrets (same backend as deploy).

name: Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY to confirm"
        required: true
        type: string

permissions:
  contents: read

jobs:
  refuse:
    if: github.event.inputs.confirm != 'DESTROY'
    runs-on: ubuntu-latest
    steps:
      - run: echo "::error::Type DESTROY exactly to confirm." && exit 1

  destroy:
    if: github.event.inputs.confirm == 'DESTROY'
    runs-on: ubuntu-latest
    environment: staging
    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_project: cv-bot
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
      TF_VAR_qdrant_url: ${{ secrets.QDRANT_URL }}
      TF_VAR_qdrant_api_key: ${{ secrets.QDRANT_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Check Terraform version
        run: terraform version

      - name: Terraform init
        working-directory: infra/terraform
        env:
          TF_STATE_BUCKET_SECRET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_BUCKET_VAR: ${{ vars.TF_STATE_BUCKET }}
          AWS_REGION_SECRET: ${{ secrets.AWS_REGION }}
          AWS_REGION_VAR: ${{ vars.AWS_REGION }}
        run: |
          set -e
          TF_STATE_BUCKET="${TF_STATE_BUCKET_SECRET:-}"
          if [ -z "${TF_STATE_BUCKET// }" ]; then
            TF_STATE_BUCKET="${TF_STATE_BUCKET_VAR:-}"
          fi
          if [ -z "${TF_STATE_BUCKET// }" ]; then
            echo "::error::TF_STATE_BUCKET is not set. Add Environment secret or variable TF_STATE_BUCKET on staging (S3 bucket name for Terraform state)."
            exit 1
          fi
          AWS_REGION="${AWS_REGION_SECRET:-}"
          if [ -z "${AWS_REGION// }" ]; then
            AWS_REGION="${AWS_REGION_VAR:-}"
          fi
          if [ -z "${AWS_REGION// }" ]; then
            echo "::error::AWS_REGION is not set for terraform init. Set on environment staging."
            exit 1
          fi
          export TF_STATE_BUCKET AWS_REGION
          terraform init -input=false \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=cv-bot/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="encrypt=true"

      - name: Terraform destroy
        working-directory: infra/terraform
        run: terraform destroy -auto-approve
