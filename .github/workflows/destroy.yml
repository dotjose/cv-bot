# Manual teardown. Pick the GitHub Environment whose secrets point at the stack to destroy.

name: Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY to confirm"
        required: true
        type: string
      target_environment:
        description: "GitHub Environment (secrets for AWS + Terraform state)"
        type: choice
        options:
          - staging
          - prod
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  refuse:
    if: github.event.inputs.confirm != 'DESTROY'
    runs-on: ubuntu-latest
    steps:
      - run: echo "::error::Type DESTROY exactly to confirm." && exit 1

  destroy:
    if: github.event.inputs.confirm == 'DESTROY'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_environment }}
    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_project: cv-bot
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
      TF_VAR_qdrant_url: ${{ secrets.QDRANT_URL }}
      TF_VAR_qdrant_api_key: ${{ secrets.QDRANT_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate AWS environment secrets (fail fast)
        id: aws_auth
        shell: bash
        env:
          GH_ENV_NAME: ${{ github.event.inputs.target_environment }}
        run: |
          set -euo pipefail
          err() {
            echo "::error::Missing required AWS environment secrets in ${GH_ENV_NAME} environment: $1"
            exit 1
          }
          r="${{ secrets.AWS_REGION }}"
          [ -n "${r// }" ] || err "AWS_REGION is empty"
          k="${{ secrets.AWS_ACCESS_KEY_ID }}"
          [ -n "${k// }" ] || err "AWS_ACCESS_KEY_ID is empty"
          s="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          [ -n "${s// }" ] || err "AWS_SECRET_ACCESS_KEY is empty"
          role="${{ secrets.AWS_ROLE_ARN }}"
          if [ -n "${role// }" ]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
          else
            echo "mode=keys" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials (OIDC)
        if: steps.aws_auth.outputs.mode == 'oidc'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configure AWS credentials (access keys)
        if: steps.aws_auth.outputs.mode == 'keys'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Require remote state configuration
        run: test -n "${{ secrets.TF_STATE_BUCKET }}" && test -n "${{ secrets.TF_LOCK_TABLE }}"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/terraform
        run: >
          terraform init -input=false
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          -backend-config="key=cv-bot/terraform.tfstate"
          -backend-config="region=${{ secrets.AWS_REGION }}"
          -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"
          -backend-config="encrypt=true"

      - name: Terraform destroy
        working-directory: infra/terraform
        run: terraform destroy -auto-approve
